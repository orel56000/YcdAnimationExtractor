name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ycd_animation_extractor
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ycd_animation_extractor.exe
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ycd_animation_extractor
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: ycd_animation_extractor
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar czvf "dist/ycd_animation_extractor-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" \
            "${{ matrix.binary }}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $name = "ycd_animation_extractor-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            -DestinationPath "dist/$name"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: assets

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
